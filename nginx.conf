# nginx.conf — Flutter Web SPA routing config
# Handles deep links and Flutter's URL routing

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter web — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # Required for Firebase Google Sign-In popup to communicate back to the app
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
}
