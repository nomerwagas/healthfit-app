name: health_app
description: Secure Health & Fitness App with Biometric Auth, Weather Integration, and MVVM Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  google_sign_in: ^6.2.1

  # State Management (MVVM)
  provider: ^6.1.2

  # Biometric Authentication
  local_auth: ^2.2.0

  # HTTP & Weather API
  http: ^1.2.1

  # Image Picker (Profile Picture)
  image_picker: ^1.1.2

  # Secure Storage (Tokens/Prefs)
  flutter_secure_storage: ^9.0.0

  # Shared Preferences
  shared_preferences: ^2.2.3

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Video Player (Sample Exercises)
  video_player: ^2.8.6
  chewie: ^1.7.4

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/
